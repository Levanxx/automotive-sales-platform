name: automotive-sales
services:
  n8n:
    image: n8nio/n8n:1.82.3
    ports: ["5678:5678"]
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - INACTIVITY_DAYS=3
      - ALERT_WEBHOOK_URL=http://host.docker.internal:8004/api/alerts
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n:/workflows:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  n8n-data:
