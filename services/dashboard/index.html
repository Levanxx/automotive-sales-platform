<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>AutoPulse | Gestión comercial</title><style>
:root{--ink:#10233f;--muted:#6b7a90;--accent:#e44b3b;--blue:#1967d2;--bg:#f3f6fa;--card:#fff}*{box-sizing:border-box}body{margin:0;font:15px system-ui;background:var(--bg);color:var(--ink)}header{background:#0b1d35;color:white;padding:24px 5%;display:flex;justify-content:space-between;align-items:center}.brand{font-size:22px;font-weight:800}.live{color:#70e0a3}main{max-width:1180px;margin:auto;padding:32px 24px}.hero{display:flex;justify-content:space-between;align-items:end;margin-bottom:24px}h1{font-size:32px;margin:0}.sub{color:var(--muted);margin-top:6px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.card{background:var(--card);padding:20px;border-radius:14px;box-shadow:0 5px 20px #14213d0d}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.value{font-size:30px;font-weight:800;margin-top:8px}.wide{grid-column:span 3}.side{grid-column:span 2}.section{margin-top:18px}button{border:0;background:var(--accent);color:white;padding:11px 16px;border-radius:9px;font-weight:700;cursor:pointer}.barrow{display:grid;grid-template-columns:110px 1fr 55px;gap:12px;align-items:center;margin:17px 0}.track{height:12px;background:#e8edf4;border-radius:8px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--blue),#58a5ff);border-radius:8px}.empty{text-align:center;color:var(--muted);padding:40px}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.wide,.side{grid-column:span 2}}@media(max-width:480px){.grid{grid-template-columns:1fr}.wide,.side{grid-column:span 1}.hero{display:block}.hero button{margin-top:14px}}
</style></head><body><header><div class="brand">AutoPulse</div><div class="live">● Indicadores en vivo</div></header><main><div class="hero"><div><h1>Panel comercial</h1><div class="sub">Prospectos, ventas y seguros en una sola vista</div></div><button onclick="load()">Actualizar</button></div><div class="grid" id="cards"></div><div class="grid section"><section class="card wide"><h2>Embudo de ventas</h2><div id="funnel"></div></section><section class="card side"><h2>Lectura rápida</h2><p class="sub">La conversión se calcula sobre todos los prospectos registrados.</p><div id="insight" class="value"></div><p>seguros vendidos vinculados a cierres efectivos.</p></section></div></main><script>
const names={initial:'Prospección',qualification:'Calificación',negotiation:'Negociación',closed:'Cierre'};async function load(){try{let d=await fetch('/api/metrics').then(r=>r.json());let cards=[['Prospectos activos',d.active_prospects],['Ventas realizadas',d.completed_sales],['Ventas fallidas',d.failed_sales],['Conversión',d.conversion_rate+'%'],['Seguros vinculados',d.linked_insurance]];document.querySelector('#cards').innerHTML=cards.map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');document.querySelector('#funnel').innerHTML=d.funnel.length?d.funnel.map(x=>`<div class="barrow"><b>${names[x.stage]}</b><div class="track"><div class="bar" style="width:${x.conversion}%"></div></div><span>${x.count} · ${x.conversion}%</span></div>`).join(''):'<div class="empty">Carga los datos de demostración para ver el embudo.</div>';document.querySelector('#insight').textContent=d.sold_insurance}catch(e){document.querySelector('#cards').innerHTML='<div class="card wide">No se pudo cargar el panel.</div>'}}load();setInterval(load,15000)
</script></body></html>
